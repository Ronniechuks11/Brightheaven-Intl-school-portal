{% extends "base.html" %}

{% block content %}

<section class="hero">

    <div class="hero-content">

        <h1>Admission Application</h1>

        <p>
            Complete the form below to apply for admission into Brightheaven International School.
        </p>

        <form method="POST" enctype="multipart/form-data">

    <input type="text" name="first_name" placeholder="First Name" required>

    <input type="text" name="last_name" placeholder="Last Name" required>

    <input type="date" name="date_of_birth" required>

    <select name="gender" required>
        <option value="">Select Gender</option>
        <option>Male</option>
        <option>Female</option>
    </select>

    <select name="class_applying" required>
        <option value="">Class Applying For</option>
        <option>Primary 1</option>
        <option>Primary 2</option>
        <option>Primary 3</option>
        <option>JS1</option>
        <option>JS2</option>
        <option>JS3</option>
        <option>SS1</option>
        <option>SS2</option>
        <option>SS3</option>
    </select>

    <input type="text" name="parent_name" placeholder="Parent/Guardian Name" required>

    <input type="tel" name="phone" placeholder="Phone Number" required>

    <input type="email" name="email" placeholder="Email Address">

    <textarea name="address" placeholder="Home Address" rows="4"></textarea>

    <button type="submit">
        Submit Application
    </button>

</form>

    </div>

</section>

{% endblock %}
